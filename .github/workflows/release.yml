name: Publish v0.1.0 prerelease

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Exact approved release tag
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Require the approved tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: python -c "import os; assert os.environ['RELEASE_TAG'] == 'v0.1.0', 'tag must be v0.1.0'"
      - name: Install build tools
        run: python -m pip install --upgrade pip build "setuptools>=68" wheel
      - name: Run all public tests
        run: python -m unittest discover -s tests/public -t . -v
      - name: Build, inspect, rebuild offline, and checksum assets
        run: >-
          python -c "import json, tempfile; from pathlib import Path; from tools.public_checksums import verify_sha256s, write_sha256s; from tools.release_artifacts import build_artifacts, build_skill_archive, inspect_artifact, rebuild_wheel_from_sdist; root=Path('.'); dist=Path('dist'); policy=json.loads(Path('release/public-release-policy.json').read_text(encoding='utf-8')); wheel,sdist=build_artifacts(root,dist); skill=build_skill_archive(Path('skills/analyzing-chemical-eia-processes'),dist/'analyzing-chemical-eia-processes-0.1.0.zip'); assert inspect_artifact(wheel,policy['wheel_exact_files']) == []; assert inspect_artifact(sdist,policy['sdist_exact_files']+policy['sdist_exact_directories']) == []; assert inspect_artifact(skill,policy['skill_zip_exact_files']) == []; temporary=tempfile.TemporaryDirectory(); rebuilt=rebuild_wheel_from_sdist(sdist,Path(temporary.name)); assert inspect_artifact(rebuilt,policy['wheel_exact_files']) == []; manifest=write_sha256s([skill,wheel,sdist],dist/'SHA256SUMS.txt'); verify_sha256s(manifest,dist,[skill.name,wheel.name,sdist.name]); temporary.cleanup()"
      - name: Create the approved GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          prerelease: true
          body_path: docs/release-notes/v0.1.0.md
          files: |
            dist/chemical_eia_core-0.1.0-py3-none-any.whl
            dist/chemical_eia_core-0.1.0.tar.gz
            dist/analyzing-chemical-eia-processes-0.1.0.zip
            dist/SHA256SUMS.txt
